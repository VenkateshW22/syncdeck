# -----------------------------------------------------------------------
# .github/workflows/deploy-prod.yml
#
# Triggered only when a version tag (v*.*.*) is pushed.
# Requires manual approval via a GitHub Environment ("production").
# Builds the production Docker image, runs migrations, then restarts
# the production stack.
#
# Required GitHub Secrets (set in the "production" Environment):
#   REGISTRY_USER         - Docker registry username
#   REGISTRY_TOKEN        - Docker registry password / PAT
#   PROD_HOST             - SSH hostname or IP of the production server
#   PROD_SSH_KEY          - Private SSH key
#   PROD_SSH_USER         - SSH user
#
# Optional Repository Variables:
#   REGISTRY              - default: ghcr.io
#   IMAGE_NAME            - default: <owner>/<repo>
# -----------------------------------------------------------------------

name: Deploy — Production

on:
  push:
    tags:
      - "v*.*.*"      # Semantic version tags: v1.0.0, v2.3.1, etc.

jobs:
  deploy-prod:
    name: Build & Deploy to Production
    runs-on: ubuntu-latest
    environment: production    # ← Gate: requires manual approval in GitHub

    permissions:
      contents: read
      packages: write

    env:
      REGISTRY: ${{ vars.REGISTRY || 'ghcr.io' }}
      IMAGE_NAME: ${{ vars.IMAGE_NAME || github.repository }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.REGISTRY_USER || github.actor }}
          password: ${{ secrets.REGISTRY_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build & push production image
        uses: docker/build-push-action@v5
        with:
          context: .
          target: runtime           # Uses the 'runtime' Dockerfile stage
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VITE_APP_ENV=production
            VITE_APP_NAME=SyncDeck

      - name: Deploy to production server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_SSH_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            set -e
            cd /opt/syncdeck

            echo "${{ secrets.REGISTRY_TOKEN || secrets.GITHUB_TOKEN }}" | \
              docker login ${{ env.REGISTRY }} -u ${{ secrets.REGISTRY_USER || github.actor }} --password-stdin

            # Pull only the app image (db/redis are managed separately)
            docker compose -f docker-compose.prod.yml pull syncdeck

            # Run DB migrations BEFORE restarting the app
            # This ensures schema is up-to-date before the new code starts.
            docker compose -f docker-compose.prod.yml run --rm \
              -e DATABASE_URL=$DATABASE_URL \
              syncdeck node dist/scripts/migrate.cjs

            # Rolling restart (Compose replaces old container with new one)
            docker compose -f docker-compose.prod.yml up -d --no-deps syncdeck

            docker image prune -f

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          generate_release_notes: true
