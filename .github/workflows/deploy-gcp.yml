# -----------------------------------------------------------------------
# .github/workflows/deploy-gcp.yml
#
# Automated GCP Cloud Run Deployment Workflow.
# Triggered on release tags (v*.*.*) or manual dispatch.
# Authenticates securely via Workload Identity Federation (Keyless).
# -----------------------------------------------------------------------

name: Deploy — GCP Cloud Run

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

jobs:
  deploy-gcp:
    name: Build & Deploy to GCP Cloud Run
    runs-on: ubuntu-latest
    environment: production

    permissions:
      contents: read
      id-token: write

    env:
      GCP_REGION: us-central1
      SERVICE_NAME: syncdeck

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry & Ensure Repository Exists
        run: |
          gcloud services enable artifactregistry.googleapis.com run.googleapis.com secretmanager.googleapis.com --project="${{ secrets.GCP_PROJECT_ID }}" || true
          gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev
          gcloud artifacts repositories describe syncdeck-repo --location=${{ env.GCP_REGION }} --project="${{ secrets.GCP_PROJECT_ID }}" &>/dev/null || \
          gcloud artifacts repositories create syncdeck-repo \
            --repository-format=docker \
            --location=${{ env.GCP_REGION }} \
            --description="SyncDeck production container repository" \
            --project="${{ secrets.GCP_PROJECT_ID }}"

      - name: Ensure GCP Secret Manager Secrets Exist
        run: |
          PROJ="${{ secrets.GCP_PROJECT_ID }}"

          create_secret_if_missing() {
            local sec_id="$1"
            local default_val="$2"
            if ! gcloud secrets describe "$sec_id" --project="$PROJ" &>/dev/null; then
              echo -n "$default_val" | gcloud secrets create "$sec_id" --data-file=- --project="$PROJ"
              echo "Created secret: $sec_id"
            else
              echo "Secret already exists: $sec_id"
            fi
          }

          JWT_VAL=$(openssl rand -base64 48)
          REFRESH_VAL=$(openssl rand -base64 48)

          create_secret_if_missing "syncdeck-jwt-secret" "$JWT_VAL"
          create_secret_if_missing "syncdeck-refresh-secret" "$REFRESH_VAL"
          create_secret_if_missing "syncdeck-db-url" "placeholder"
          create_secret_if_missing "syncdeck-redis-url" "placeholder"

      # NOTE: Secret Manager IAM is one-time setup — run scripts/setup-iam.sh once
      # from your local machine with owner credentials. See README for details.

      - name: Build & Push Container Image to Artifact Registry
        run: |
          IMAGE_URI="${{ env.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/syncdeck-repo/${{ env.SERVICE_NAME }}:${{ github.sha }}"
          docker build \
            --target runtime \
            --build-arg VITE_APP_ENV=production \
            --build-arg VITE_APP_NAME=SyncDeck \
            -t "$IMAGE_URI" .
          docker push "$IMAGE_URI"

      - name: Run Database Migrations via Cloud Run Job
        continue-on-error: true
        run: |
          PROJ="${{ secrets.GCP_PROJECT_ID }}"
          IMAGE_URI="${{ env.GCP_REGION }}-docker.pkg.dev/${PROJ}/syncdeck-repo/${{ env.SERVICE_NAME }}:${{ github.sha }}"

          # Guard: only run migrations if syncdeck-db-url has a real (non-placeholder) version
          DB_VAL=$(gcloud secrets versions access latest \
            --secret="syncdeck-db-url" --project="$PROJ" 2>/dev/null || echo "")

          if [[ -z "$DB_VAL" || "$DB_VAL" == "placeholder" ]]; then
            echo "⚠️  syncdeck-db-url is empty or placeholder — skipping migrations."
            echo "   Set a real DATABASE_URL in Secret Manager and redeploy to run migrations."
            exit 0
          fi

          gcloud run jobs deploy syncdeck-migrate \
            --image="$IMAGE_URI" \
            --region="${{ env.GCP_REGION }}" \
            --command="node" \
            --args="dist/scripts/migrate.cjs" \
            --set-env-vars="NODE_ENV=production" \
            --set-secrets="DATABASE_URL=syncdeck-db-url:latest" \
            --quiet

          gcloud run jobs execute syncdeck-migrate \
            --region="${{ env.GCP_REGION }}" \
            --wait

      - name: Deploy Service to Cloud Run
        run: |
          PROJ="${{ secrets.GCP_PROJECT_ID }}"
          IMAGE_URI="${{ env.GCP_REGION }}-docker.pkg.dev/${PROJ}/syncdeck-repo/${{ env.SERVICE_NAME }}:${{ github.sha }}"

          # Check if DB/Redis secrets have real values yet
          DB_VAL=$(gcloud secrets versions access latest \
            --secret="syncdeck-db-url" --project="$PROJ" 2>/dev/null || echo "placeholder")

          BASE_FLAGS=(
            --image="$IMAGE_URI"
            --region="${{ env.GCP_REGION }}"
            --service-account="${{ secrets.GCP_PROJECT_NUMBER }}-compute@developer.gserviceaccount.com"
            --session-affinity
            --min-instances=1
            --max-instances=1
            --port=3000
            --cpu=2
            --memory=2Gi
            --set-env-vars="NODE_ENV=production,APP_ORIGIN=${{ secrets.APP_ORIGIN }},APP_URL=${{ secrets.APP_ORIGIN }}"
            --allow-unauthenticated
            --quiet
          )

          if [[ -z "$DB_VAL" || "$DB_VAL" == "placeholder" ]]; then
            echo "⚠️  DB/Redis secrets are placeholders — deploying without DB/Redis secret bindings."
            echo "   App will start but DB/Redis features won't work until real secrets are set."
            gcloud run deploy "${{ env.SERVICE_NAME }}" "${BASE_FLAGS[@]}" \
              --set-secrets="JWT_SECRET=syncdeck-jwt-secret:latest,REFRESH_SECRET=syncdeck-refresh-secret:latest" \
              --update-env-vars="DATABASE_URL=${{ secrets.DATABASE_URL }},REDIS_URL=${{ secrets.REDIS_URL }}"
          else
            echo "✅ Real DB/Redis secrets found — binding from Secret Manager."
            gcloud run deploy "${{ env.SERVICE_NAME }}" "${BASE_FLAGS[@]}" \
              --set-secrets="JWT_SECRET=syncdeck-jwt-secret:latest,REFRESH_SECRET=syncdeck-refresh-secret:latest,DATABASE_URL=syncdeck-db-url:latest,REDIS_URL=syncdeck-redis-url:latest"
          fi
