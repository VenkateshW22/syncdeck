# -----------------------------------------------------------------------
# .github/workflows/ci.yml
#
# Runs on every pull request and every push to main/staging.
# Gates: TypeScript check → Unit Tests → Build → Docker Image Smoke Test
# -----------------------------------------------------------------------

name: CI

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]

jobs:
  ci:
    name: Lint, Test & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npm run lint

      - name: Run unit tests
        run: npm test

      - name: Build (verify bundle compiles)
        run: npm run build
        env:
          # Dummy values so Vite bakes in non-empty strings (no secrets needed for a build check)
          VITE_APP_ENV: ci
          VITE_APP_NAME: SyncDeck

  docker-smoke:
    name: Docker Staging Image Smoke Test
    runs-on: ubuntu-latest
    needs: ci    # Only run after unit tests + build pass

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build staging Docker image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          target: staging
          push: false
          tags: syncdeck:ci-smoke
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VITE_APP_ENV=staging
            VITE_APP_NAME=SyncDeck (Staging)

      - name: Start staging stack
        run: |
          # Write a minimal .env.staging for CI (no real secrets needed — just enough to start)
          cat > .env.staging <<'EOF'
          NODE_ENV=staging
          PORT=3000
          JWT_SECRET=ci_test_jwt_secret_at_least_32_characters_long_abc123
          REFRESH_SECRET=ci_test_refresh_secret_at_least_32_characters_abc123
          POSTGRES_PASSWORD=ci_test_postgres_password
          DATABASE_URL=postgresql://postgres:ci_test_postgres_password@db:5432/syncdeck
          REDIS_URL=redis://redis:6379
          APP_ORIGIN=http://localhost:80
          APP_URL=http://localhost:80
          cp .env.staging .env
          docker compose -f docker-compose.staging.yml up -d --no-build

      - name: Wait for health endpoint
        run: ./scripts/smoke-test.sh http://localhost:80
        timeout-minutes: 2

      - name: Tear down
        if: always()
        run: docker compose -f docker-compose.staging.yml down -v
