# -----------------------------------------------------------------------
# .github/workflows/deploy-staging.yml
#
# Triggered on every push to the `staging` branch (after CI passes).
# Builds the Docker image, pushes to registry, SSHes into the staging
# server, pulls the new image, runs migrations, and restarts the stack.
# Ends with a health-check that fails the pipeline if the app doesn't
# come up within 60 seconds.
#
# Required GitHub Secrets:
#   REGISTRY_USER        - Docker registry username (e.g. GitHub username)
#   REGISTRY_TOKEN       - Docker registry password / PAT
#   STAGING_HOST         - SSH hostname or IP of the staging server
#   STAGING_SSH_KEY      - Private SSH key (add public key to staging server)
#   STAGING_SSH_USER     - SSH user (e.g. ubuntu)
#
# Optional — set in repository Variables (not Secrets):
#   REGISTRY             - Image registry (default: ghcr.io)
#   IMAGE_NAME           - Image name (default: <owner>/<repo>)
# -----------------------------------------------------------------------

name: Deploy — Staging

on:
  push:
    branches: [staging]

jobs:
  deploy-staging:
    name: Build & Deploy to Staging
    runs-on: ubuntu-latest
    environment: staging       # Requires approval gate if configured in GitHub

    permissions:
      contents: read
      packages: write          # Push to GitHub Container Registry

    env:
      REGISTRY: ${{ vars.REGISTRY || 'ghcr.io' }}
      IMAGE_NAME: ${{ vars.IMAGE_NAME || github.repository }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.REGISTRY_USER || github.actor }}
          password: ${{ secrets.REGISTRY_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=staging-,format=short

      - name: Build & push staging image
        uses: docker/build-push-action@v5
        with:
          context: .
          target: staging          # Uses the 'staging' Dockerfile stage (NODE_ENV=staging)
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # ARG values declared in Dockerfile builder stage — baked into the client bundle
          build-args: |
            VITE_APP_ENV=staging
            VITE_APP_NAME=SyncDeck (Staging)

      - name: Deploy to staging server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_SSH_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            set -e
            cd /opt/syncdeck

            # Pull the new image
            echo "${{ secrets.REGISTRY_TOKEN || secrets.GITHUB_TOKEN }}" | \
              docker login ${{ env.REGISTRY }} -u ${{ secrets.REGISTRY_USER || github.actor }} --password-stdin

            docker compose -f docker-compose.staging.yml pull syncdeck

            # Run migrations BEFORE restarting app
            docker compose -f docker-compose.staging.yml run --rm migrate

            # Restart app with zero-downtime (Compose replaces old container with new one)
            docker compose -f docker-compose.staging.yml up -d --no-deps syncdeck

            # Remove old images to save disk space
            docker image prune -f

      - name: Post-deploy health check
        # Poll the staging health endpoint for up to 60 seconds.
        # Fails the pipeline if the app doesn't respond — prevents silent broken deploys.
        run: |
          echo "Waiting for staging to become healthy..."
          TIMEOUT=60
          ELAPSED=0
          URL="http://${{ secrets.STAGING_HOST }}/api/v1/health"

          until curl -sf "$URL" | grep -q '"status"'; do
            if [ "$ELAPSED" -ge "$TIMEOUT" ]; then
              echo "❌ Health check timed out after ${TIMEOUT}s — deploy may have failed."
              exit 1
            fi
            echo "  ... not ready yet (${ELAPSED}s elapsed)"
            sleep 5
            ELAPSED=$((ELAPSED + 5))
          done

          echo "✅ Staging is healthy at $URL"
