# -----------------------------------------------------------------------
# nginx/nginx.conf
#
# Nginx reverse proxy for SyncDeck — production and staging.
# Handles:
#   - HTTP → HTTPS redirect
#   - SSL termination (configure your cert paths below)
#   - WebSocket proxying (Socket.IO long-poll + upgrade)
#   - Gzip compression
#   - Static asset caching
#   - Security headers
#
# Usage with docker-compose:
#   Add an nginx service that mounts this file and depends on syncdeck.
#
# Usage standalone (on a VM):
#   sudo cp nginx.conf /etc/nginx/sites-available/syncdeck
#   sudo ln -sf /etc/nginx/sites-available/syncdeck /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
# -----------------------------------------------------------------------

# ---- Upstream -----------------------------------------------------------
upstream syncdeck_backend {
    # If running multiple app instances (horizontal scaling), add more
    # server lines here. nginx will round-robin between them.
    server 127.0.0.1:3000;
    # server 127.0.0.1:3001;  # second instance
    keepalive 32;
}

# ---- HTTP → HTTPS redirect ----------------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name app.syncdeck.example.com;   # ← change to your domain

    # Let's Encrypt / ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ---- HTTPS main server --------------------------------------------------
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name app.syncdeck.example.com;   # ← change to your domain

    # ---- SSL ----------------------------------------------------------------
    # Managed certs (e.g. Let's Encrypt via certbot):
    ssl_certificate     /etc/letsencrypt/live/app.syncdeck.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.syncdeck.example.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # HSTS (1 year) — only enable once you're confident HTTPS is solid
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ---- Security headers ---------------------------------------------------
    add_header X-Content-Type-Options    "nosniff"         always;
    add_header X-Frame-Options           "SAMEORIGIN"      always;
    add_header X-XSS-Protection          "1; mode=block"   always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;

    # ---- Gzip ---------------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain text/css text/xml application/json application/javascript
        application/rss+xml application/atom+xml image/svg+xml
        application/wasm font/woff font/woff2;

    # ---- Client max body size (file uploads) --------------------------------
    client_max_body_size 50M;

    # ---- Static assets — long cache -----------------------------------------
    # The Vite build fingerprints assets (e.g. main.a1b2c3.js) so they can
    # be cached forever.
    location ~* ^/assets/ {
        proxy_pass http://syncdeck_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # ---- Socket.IO WebSocket upgrade ----------------------------------------
    # socket.io uses /ws/rooms as its namespace path.
    location /ws/ {
        proxy_pass http://syncdeck_backend;
        proxy_http_version 1.1;

        # WebSocket upgrade headers
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Long timeouts for persistent connections
        proxy_read_timeout  86400s;
        proxy_send_timeout  86400s;
        proxy_connect_timeout 60s;

        # Disable buffering for streaming responses
        proxy_buffering off;
    }

    # ---- Socket.IO long-polling fallback ------------------------------------
    location /socket.io/ {
        proxy_pass http://syncdeck_backend;
        proxy_http_version 1.1;

        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout  86400s;
        proxy_send_timeout  86400s;
        proxy_buffering off;
    }

    # ---- All other traffic (API + SPA) --------------------------------------
    location / {
        proxy_pass http://syncdeck_backend;
        proxy_http_version 1.1;

        proxy_set_header Connection "";   # Enable HTTP/1.1 keep-alive to upstream
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout  60s;
        proxy_send_timeout  60s;
        proxy_connect_timeout 10s;

        # Prevent nginx from caching API responses
        proxy_no_cache 1;
        proxy_cache_bypass 1;
    }
}
