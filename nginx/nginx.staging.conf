# -----------------------------------------------------------------------
# nginx/nginx.staging.conf
#
# Staging-specific Nginx config — HTTP only (port 80).
# Put Cloudflare or a cloud load balancer in front for TLS termination.
#
# In docker-compose.staging.yml this file is mounted as:
#   ./nginx/nginx.staging.conf:/etc/nginx/conf.d/default.conf:ro
#
# The upstream service name "syncdeck" resolves via Docker Compose DNS.
# -----------------------------------------------------------------------

upstream syncdeck_backend {
    server syncdeck:3000;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name _;   # Accept any hostname — useful for IP-based staging access

    # ---- Staging banner (visible in response headers) -------------------
    add_header X-Environment "staging" always;

    # ---- Security headers -----------------------------------------------
    add_header X-Content-Type-Options    "nosniff"                          always;
    add_header X-Frame-Options           "SAMEORIGIN"                       always;
    add_header X-XSS-Protection          "1; mode=block"                    always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"  always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;

    # ---- Gzip compression -----------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1000;
    gzip_types
        text/plain text/css text/xml application/json application/javascript
        application/rss+xml application/atom+xml image/svg+xml
        application/wasm font/woff font/woff2;

    # ---- Client max body size (file uploads) ----------------------------
    client_max_body_size 50M;

    # ---- Static assets — long cache (Vite fingerprints file names) ------
    location ~* ^/assets/ {
        proxy_pass http://syncdeck_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # ---- Socket.IO WebSocket upgrade ------------------------------------
    location /ws/ {
        proxy_pass http://syncdeck_backend;
        proxy_http_version 1.1;

        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Long timeouts for persistent WebSocket connections
        proxy_read_timeout  86400s;
        proxy_send_timeout  86400s;
        proxy_connect_timeout 60s;
        proxy_buffering off;
    }

    # ---- Socket.IO long-polling fallback --------------------------------
    location /socket.io/ {
        proxy_pass http://syncdeck_backend;
        proxy_http_version 1.1;

        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout  86400s;
        proxy_send_timeout  86400s;
        proxy_buffering off;
    }

    # ---- All other traffic (API + React SPA) ----------------------------
    location / {
        proxy_pass http://syncdeck_backend;
        proxy_http_version 1.1;

        proxy_set_header Connection        "";
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout    60s;
        proxy_send_timeout    60s;
        proxy_connect_timeout 10s;

        # Prevent Nginx from caching API responses
        proxy_no_cache 1;
        proxy_cache_bypass 1;
    }
}
